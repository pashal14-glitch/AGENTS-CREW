document.getElementById('fileInput').addEventListener('change', async function(e) {
    const file = e.target.files[0];
    if (!file) return;

    document.getElementById('fileName').textContent = '✅ ' + file.name;
    document.getElementById('uploadArea').classList.add('loaded');

    try {
        const data = await file.arrayBuffer();
        lastFileData = data;
        const workbook = XLSX.read(data, { type: 'array' });
        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
        
        // קריאה כמערך שורות
        const allRows = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
        
        // מציאת שורת הכותרות - מחפשים את השורה שמכילה "סמל"
        let headerRowIndex = -1;
        for (let i = 0; i < Math.min(allRows.length, 5); i++) {
            const row = allRows[i];
            if (row && row.some(cell => String(cell || '').trim() === 'סמל')) {
                headerRowIndex = i;
                break;
            }
        }

        if (headerRowIndex === -1) {
            showMessage('❌ לא נמצאה שורת כותרות עם השדה "סמל"', 'error');
            return;
        }

        const headers = allRows[headerRowIndex].map(h => String(h || '').trim());
        console.log('כותרות:', headers);

        // המרה לאובייקטים
        const dataRows = [];
        for (let i = headerRowIndex + 1; i < allRows.length; i++) {
            const row = allRows[i];
            if (!row || row.length === 0) continue;
            
            const obj = {};
            headers.forEach((header, idx) => {
                if (header) obj[header] = row[idx];
            });
            
            if (obj[COL.SEMEL]) {
                dataRows.push(obj);
            }
        }

        rawData = dataRows;
        console.log(`✅ נטענו ${rawData.length} רשומות`);

    
parseEmployeeData();

function parseEmployeeData() {
    employeeData = {
        zehut: null,
        misparOved: null,
        misrad: null,
        rows: rawData,
        elements: {}
    };

    rawData.forEach(row => {
        if (!employeeData.zehut) {
            employeeData.zehut = row[COL.ZEHUT] || '';
            employeeData.misparOved = row[COL.MISPAR_OVED] || '';
            employeeData.misrad = row[COL.MISRAD] || '';
        }

        const semel = Number(row[COL.SEMEL] || 0);
        if (!employeeData.elements[semel]) {
            employeeData.elements[semel] = [];
        }

      employeeData.elements[semel].push({
            semel: semel,
            shemSemel: row[COL.SHEM_SEMEL] || '',
            taarichSachar: row[COL.TAARICH_SACHAR] || '',
            taarichErech: row[COL.TAARICH_ERECH] || '',
            // שדות 1-4 (עמודות I-L)
            schum: Number(row[COL.SCHUM] || 0),       // שדה 1
            kamut: Number(row[COL.KAMUT] || 0),       // שדה 2
            achuz: Number(row[COL.ACHUZ] || 0),       // שדה 3
            taarif: Number(row[COL.TAARIF] || 0),     // שדה 4
            // שדות 5-8 (עמודות M-P)
            pratim: row[COL.PRATIM] || '',            // שדה 5
            seifTaktziv: row[COL.SEIF_TAKTZIV] || '', // שדה 6
            taarichM: row[COL.TAARICH_M] || '',       // שדה 7
            taarichAd: row[COL.TAARICH_AD] || '',     // שדה 8
            // שדות 9-16 (עמודות Q-X = VALUE_5 עד VALUE_12)
            field9: Number(row[COL.VALUE_5] || 0),
            field10: Number(row[COL.VALUE_6] || 0),

/** פורמט א' (998, 55, 999) - שנים וחודשים בשדה סכום. למשל 38.25 = 38 שנים + 3 חודשים */
function parseVatikFormatA(schum) {
    const years = Math.floor(schum);
    const months = Math.round((schum - years) * 12);
    return { years, months };
}

/** פורמט ב' (1, 2, 794, 20) - שנים בסכום, חודשים באחוז */
function parseVatikFormatB(schum, achuz) {
    const years = Math.floor(schum);
    const months = Math.round(achuz);
    return { years, months };
}

/** פורמט ותק לטקסט קריא */
function formatVatik(vatik) {
    if (vatik.years === 0 && vatik.months === 0) return '0';
    let parts = [];
    if (vatik.years > 0) parts.push(`${vatik.years} שנים`);
    if (vatik.months > 0) parts.push(`${vatik.months} חודשים`);
    return parts.join(' ו-');
}

    const details = document.getElementById('gilumDetails');
    const btn = document.getElementById('gilumExpandBtn');
    
    if (details.style.display === 'none') {
        details.style.display = 'block';
        btn.textContent = '📖 צמצם הסבר';
    } else {
        details.style.display = 'none';
        btn.textContent = '📖 הרחב הסבר מפורט';
    }
}
function checkSimpleRule(ruleName) {
    const rule = SIMPLE_RULES[ruleName];
    if (!rule) return null;

    // חיפוש לפי שם סמל (עמודה F)
    let matchedRows = null;
    for (const rows of Object.values(employeeData.elements)) {
const found = rows.filter(r => r.shemSemel.includes(ruleName) || ruleName.includes(r.shemSemel));
        if (found.length > 0) {
            matchedRows = found;
            break;
        }
    }

    if (!matchedRows || matchedRows.length === 0) {
        showMessage(`לא נמצא רכיב "${ruleName}" עבור עובד זה.`, 'warning');
        return null;
    }

    const row = matchedRows[0];
    let explanation = `${rule.explanation}\n\n`;

    for (const [field, label] of Object.entries(rule.fields)) {
        const value = row[field] || 0;
        explanation += `<span class="highlight">${label}</span>: ${value.toLocaleString('he-IL', {minimumFractionDigits: 2})}\n`;
    }

    if (rule.relatedSemel && rule.checkPercent) {
    const relatedRows = employeeData.elements[rule.relatedSemel];
    if (relatedRows && relatedRows.length > 0) {
        const base = relatedRows[0].schum;
        const expected = base * rule.checkPercent;
        explanation += `\nשכר קובע (${rule.relatedSemel}): ${base.toLocaleString('he-IL', {minimumFractionDigits: 2})} ש"ח\n`;
        explanation += `צפוי (${rule.checkPercent * 100}%): ${expected.toLocaleString('he-IL', {minimumFractionDigits: 2})} ש"ח\n`;
        
        const diff = Math.abs(row.schum - expected);
        if (diff < 1) {
            explanation += `\n✅ הסכום תואם את החישוב.`;
        } else {
            explanation += `\n⚠️ פער של ${diff.toLocaleString('he-IL', {minimumFractionDigits: 2})} ש"ח מהחישוב הצפוי.`;
        }
    }

function buildTlush() {
    const container = document.getElementById('tlushCategories');
    container.innerHTML = '';
// בדיקה שיש רק תאריך שכר אחד
    const uniqueSalaryDates = [...new Set(
        rawData
            .map(row => row[COL.TAARICH_SACHAR])
            .filter(d => d !== undefined && d !== null && d !== '' && d !== 'תאריך שכר')
    )];
    
    if (uniqueSalaryDates.length > 1) {
        document.getElementById('tlushEmployeeInfo').innerHTML = '';
        container.innerHTML = `<div class="message warning">⚠️ לצורך תצוגת תלוש יש לטעון נתונים לחודש שכר אחד בלבד.<br>נמצאו ${uniqueSalaryDates.length} תאריכי שכר שונים.</div>`;
        document.getElementById('tlushPanel').style.display = 'block';
        return;
    }
    
    if (uniqueSalaryDates.length === 0) {
        document.getElementById('tlushEmployeeInfo').innerHTML = '';
        container.innerHTML = `<div class="message warning">⚠️ לא נמצאו נתוני שכר.</div>`;
        document.getElementById('tlushPanel').style.display = 'block';
        return;
    }
    // פרטי עובד
    document.getElementById('tlushEmployeeInfo').innerHTML =
        `<span>👤 זהות: <strong>${employeeData.zehut}</strong></span>` +
        `<span>מספר עובד: <strong>${employeeData.misparOved}</strong></span>` +
        `<span>משרד: <strong>${employeeData.misrad}</strong></span>`;

    // חלוקה לקטגוריות לפי שורות כותרת חוזרות
    const allRows = XLSX.utils.sheet_to_json(
        XLSX.read(lastFileData, { type: 'array' }).Sheets[
            XLSX.read(lastFileData, { type: 'array' }).SheetNames[0]
        ], { header: 1 }
    );

    let categories = [];
    let currentCat = { name: CATEGORIES[0], rows: [] };
    let catIndex = 0;
    let headersFound = 0;

    // מציאת שורת כותרות ראשונה
    let headerRowIndex = -1;
    for (let i = 0; i < Math.min(allRows.length, 5); i++) {
        if (allRows[i] && allRows[i].some(cell => String(cell || '').trim() === 'סמל')) {
            headerRowIndex = i;
            break;
        }
    }

    const headers = allRows[headerRowIndex];

    for (let i = headerRowIndex + 1; i < allRows.length; i++) {
        const row = allRows[i];
        if (!row || row.length === 0) continue;

        // בדיקה אם זו שורת כותרות חוזרת
        if (row.some(cell => String(cell || '').trim() === 'סמל')) {
            // שמירת קטגוריה קודמת
            if (currentCat.rows.length > 0) {
                categories.push(currentCat);
            }
            catIndex++;
            currentCat = { name: CATEGORIES[catIndex] || `קטגוריה ${catIndex + 1}`, rows: [] };
            continue;
        }

        // שורת נתונים רגילה
        const obj = {};
        headers.forEach((header, idx) => {
            if (header) obj[String(header).trim()] = row[idx];
        });

        if (obj[COL.SEMEL]) {
            currentCat.rows.push(obj);
        }
    }
    // שמירת קטגוריה אחרונה
    if (currentCat.rows.length > 0) {
        categories.push(currentCat);
    }

    // סינון נתוני עזר - רק סמלים ספציפיים
    const allowedEzer = [91025, 4717, 4720, 90146];

    // בניית HTML לכל קטגוריה
    function buildCatHtml(cat) {
        const grouped = {};
        
        // משתנים לאיחוד גילומים
        let gilumMasTotal = { shotef: 0, hefarshim: 0, hefarshimCount: 0, hasData: false };
        let gilumBLTotal = { shotef: 0, hefarshim: 0, hefarshimCount: 0, hasData: false };
        
        cat.rows.forEach(row => {
            const semel = Number(row[COL.SEMEL] || 0);
            const semelStr = row[COL.SEMEL] || '';
            const shemSemel = row[COL.SHEM_SEMEL] || '';
            const originalSchum = Number(row[COL.SCHUM] || 0);
            const kamut = Number(row[COL.KAMUT] || 0);
            const tSachar = row[COL.TAARICH_SACHAR];
            const tErech = row[COL.TAARICH_ERECH];
            const isShotef = (tSachar === tErech);

            // סינון נתוני עזר
            if (cat.name === 'נתוני עזר') {
                if (!allowedEzer.includes(semel)) return;
                
                if (semel === 90146 && Math.floor(originalSchum) !== 998) {
                    return;
                }
            }

            const displayValue = (semel === 90146) ? kamut : originalSchum;

            // איחוד גילום מס (8000-8099)
            if (semel >= 8000 && semel <= 8099) {
                gilumMasTotal.hasData = true;
                if (isShotef) {
                    gilumMasTotal.shotef += displayValue;
                } else {
                    gilumMasTotal.hefarshim += displayValue;
                    gilumMasTotal.hefarshimCount++;
                }
                return;
            }
            
            // איחוד גילום ביטוח לאומי (8100-8199)
            if (semel >= 8100 && semel <= 8199) {
                gilumBLTotal.hasData = true;
                if (isShotef) {
                    gilumBLTotal.shotef += displayValue;
                } else {
                    gilumBLTotal.hefarshim += displayValue;
                    gilumBLTotal.hefarshimCount++;
                }
                return;
            }

            if (!grouped[semelStr]) {
                grouped[semelStr] = {
                    semel: semelStr,
                    shemSemel: shemSemel,
                    shotef: null,
                    hefarshim: { schum: 0, count: 0 }
                };
            }

            if (isShotef && !grouped[semelStr].shotef) {
                grouped[semelStr].shotef = { schum: displayValue };
            } else {
                grouped[semelStr].hefarshim.schum += displayValue;
                grouped[semelStr].hefarshim.count++;
            }
        });

        // הוספת שורות מאוחדות לגילומים
        if (gilumMasTotal.hasData) {
            grouped['8000-8099'] = {
                semel: '8000-8099',
                shemSemel: 'גילום מס הכנסה',
                shotef: { schum: gilumMasTotal.shotef },
                hefarshim: { schum: gilumMasTotal.hefarshim, count: gilumMasTotal.hefarshimCount },
                isGilum: true
            };
        }
        
        if (gilumBLTotal.hasData) {
            grouped['8100-8199'] = {
                semel: '8100-8199',
                shemSemel: 'גילום ביטוח לאומי',
                shotef: { schum: gilumBLTotal.shotef },
                hefarshim: { schum: gilumBLTotal.hefarshim, count: gilumBLTotal.hefarshimCount },
                isGilum: true
            };
        }

        let html = `<div class="tlush-category-title">${cat.name}</div>`;
        html += `<table class="tlush-table">`;
        html += `<tr><th>סמל</th><th>שם</th><th>שוטף</th><th>הפרשים</th><th></th></tr>`;

        for (const semel in grouped) {
            const g = grouped[semel];
            const hasExplanation = g.isGilum ? true : hasExplanationRule(g.shemSemel, semel);
            const rowClass = hasExplanation ? 'has-explanation' : '';
            const shotef = g.shotef || { schum: 0 };
            const hefStr = g.hefarshim.count > 0
                ? `${g.hefarshim.schum.toLocaleString('he-IL', {minimumFractionDigits: 2})}`
                : '';

            // עבור גילומים, נשלח 8000 כפרמטר כדי להפעיל את checkGilum
            const semelForClick = g.isGilum ? 8000 : semel;
            
            html += `<tr class="${rowClass}" onclick="showTlushExplanation('${g.shemSemel.replace(/'/g, "\\'")}', ${semelForClick})">`;
            html += `<td>${g.semel}</td>`;
            html += `<td>${g.shemSemel}</td>`;
            html += `<td>${shotef.schum.toLocaleString('he-IL', {minimumFractionDigits: 2})}</td>`;
            html += `<td>${hefStr}</td>`;
            html += `<td>${hasExplanation ? '<span class="tlush-explain-icon">💡</span>' : ''}</td>`;
            html += `</tr>`;
        }

        html += `</table>`;
        return html;
    }

    // תשלומים וניכויים זה ליד זה
    const tashlumim = categories.find(c => c.name === 'תשלומים');
    const nikuyim = categories.find(c => c.name === 'ניכויים');

    if (tashlumim || nikuyim) {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'tlush-row';
        if (tashlumim) {
            const div = document.createElement('div');
            div.className = 'tlush-category';
            div.innerHTML = buildCatHtml(tashlumim);
            rowDiv.appendChild(div);
        }
        if (nikuyim) {
            const div = document.createElement('div');
            div.className = 'tlush-category';
            div.innerHTML = buildCatHtml(nikuyim);
            rowDiv.appendChild(div);
        }
        container.appendChild(rowDiv);
    }

    // הפרשות וזקיפות זה ליד זה
    const hafrashot = categories.find(c => c.name === 'הפרשות');
    const zkifot = categories.find(c => c.name === 'זקיפות');

    if (hafrashot || zkifot) {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'tlush-row';
        if (hafrashot) {
            const div = document.createElement('div');
            div.className = 'tlush-category';
            div.innerHTML = buildCatHtml(hafrashot);
            rowDiv.appendChild(div);
        }
        if (zkifot) {
            const div = document.createElement('div');
            div.className = 'tlush-category';
            div.innerHTML = buildCatHtml(zkifot);
            rowDiv.appendChild(div);
        }
        container.appendChild(rowDiv);
    }

    // נתוני עזר - שורה בודדת
    const ezer = categories.find(c => c.name === 'נתוני עזר');
    if (ezer) {
        const div = document.createElement('div');
        div.className = 'tlush-category';
        div.innerHTML = buildCatHtml(ezer);
        container.appendChild(div);
    }

    document.getElementById('tlushPanel').style.display = 'block';
}
function hasExplanationRule(shemSemel, semelNum) {
    const num = Number(semelNum);
    
    // בדיקה אם זה סמל גילום
    if ((num >= 8000 && num <= 8099) || (num >= 8100 && num <= 8199)) {
        return true;
    }
    
    if (COMPLEX_RULES_MAP[num]) return true;
    
    for (const key in SIMPLE_RULES) {
        if (shemSemel.includes(key) || key.includes(shemSemel)) {
            return true;
        }
    }
    return false;
}
function showTlushExplanation(shemSemel, semelNum) {
    const num = Number(semelNum);
    let result = null;

    // בדיקה אם זה סמל גילום (8000-8099 או 8100-8199)
    if ((num >= 8000 && num <= 8099) || (num >= 8100 && num <= 8199)) {
        result = checkGilum();
    }
    // קודם נבדוק אם זה סמל של בדיקה מורכבת לפי המספר
    else if (COMPLEX_RULES_MAP[num]) {
        const checkType = COMPLEX_RULES_MAP[num];
        if (checkType === 'vatik') {
            result = checkVatik();
        } else if (checkType === 'nihul4517') {
            result = checkNihul4517();
        } else if (checkType === 'bruto91025') {
            result = check91025();
        } else if (checkType === 'checkTax') {
            result = checkTax();
        } else if (checkType === 'checkBituachLeumi') {
            result = checkBituachLeumi();
        } else if (checkType === 'checkGilum') {
            result = checkGilum();
        }
    } else {
        // נחפש בחוקים הפשוטים לפי שם
        let ruleName = '';
        for (const key in SIMPLE_RULES) {
            if (shemSemel.includes(key) || key.includes(shemSemel)) {
                ruleName = key;
                break;
            }
        }

        if (ruleName) {
            result = checkSimpleRule(ruleName);
            if (!result && SIMPLE_RULES[ruleName]) {
                result = {
                    title: SIMPLE_RULES[ruleName].name,
                    explanation: SIMPLE_RULES[ruleName].explanation
                };
            }
        }
    }

    // הדפסת התוצאה לפאנל
    if (result) {
        document.getElementById('tlushExpTitle').textContent = result.title;
        document.getElementById('tlushExpContent').innerHTML = result.explanation;
    } else {
        document.getElementById('tlushExpTitle').textContent = `${shemSemel} (${semelNum})`;
        document.getElementById('tlushExpContent').innerHTML = 'אין הסבר זמין לרכיב זה.';
    }
    
    document.getElementById('tlushExplanation').style.display = 'block';
}

function closeTlushExplanation() {
    document.getElementById('tlushExplanation').style.display = 'none';
}
const CHAT_SERVER = 'http://127.0.0.1:5001';

function chatAppend(text, isUser) {
    const box = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.style.cssText = `background:${isUser?'#DCF8C6':'#fff'}; border:1px solid #e0e0e0; border-radius:12px; padding:10px 13px; font-size:0.9em; align-self:${isUser?'flex-end':'flex-start'}; max-width:90%; white-space:pre-wrap;`;
    div.textContent = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    return div;
}

async function chatSend() {
    const input = document.getElementById('chatInput');
    const question = input.value.trim();
    if (!question) return;
    input.value = '';
    chatAppend(question, true);
    const typing = chatAppend('מחשב תשובה...', false);
    try {
        const hasEmployee = employeeData && employeeData.zehut;
        const endpoint = hasEmployee ? '/ask_with_data' : '/ask';
        const body = hasEmployee ? { question, employeeData } : { question };
        const res = await fetch(CHAT_SERVER + endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        typing.remove();
        const data = await res.json();
        chatAppend(data.answer || data.error, false);
    } catch(e) {
        typing.remove();
        chatAppend('❌ השרת לא מגיב. וודאי שפייתון פועל.', false);
    }
}
